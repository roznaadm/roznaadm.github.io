<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Carli Susanto</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0f172a;
  color: white;
}

.container {
  max-width: 1100px;
  margin: auto;
  padding: 20px;
}

/* HEADER */
.header {
  text-align: center;
}

.profile {
  width: 100px;
  border-radius: 50%;
}

/* LINKS */
.links {
  text-align: center;
}

.links a {
  display: inline-block;
  margin: 8px;
  padding: 10px 18px;
  background: #1e293b;
  border-radius: 10px;
  text-decoration: none;
  color: white;
  transition: 0.3s;
}

.links a:hover {
  transform: scale(1.1);
}

/* GRID */
.grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 20px;
  margin-top: 30px;
}

.column {
  display: flex;
  flex-direction: column;
  gap: 15px;
}

.card {
  background: #1e293b;
  padding: 10px;
  border-radius: 12px;
}

/* TikTok fix */
.tiktok-embed {
  margin: auto !important;
}

/* iframe */
iframe {
  width: 100%;
  height: 250px;
  border-radius: 10px;
}

/* MOBILE */
@media (max-width: 900px) {
  .grid {
    grid-template-columns: 1fr;
  }
}
</style>
</head>

<body>

<div class="container">

<!-- HEADER -->
<div class="header">
  <img class="profile" src="https://pbs.twimg.com/profile_images/1879046675286941697/oV-q5rRK_400x400.jpg">
  <h1>Carli Susanto</h1>
  <p>Content Creator | Web3 | Crypto</p>
</div>

<!-- LINKS -->
<div class="links">
  <a href="https://www.tiktok.com/@carli.eth" target="_blank">🎵 TikTok</a>
  <a href="https://www.youtube.com/@C-Quest/" target="_blank">▶️ YouTube</a>
  <a href="https://x.com/CharlieAkatsuki" target="_blank">🐦 X</a>
</div>

<!-- GRID -->
<div class="grid">

  <!-- TikTok -->
  <div class="column">
    <h3>🎵 TikTok</h3>

    <div class="card">
      <blockquote class="tiktok-embed"
      cite="https://www.tiktok.com/@carli.eth/video/7626147395079802133"></blockquote>
    </div>

    <div class="card">
      <blockquote class="tiktok-embed"
      cite="https://www.tiktok.com/@carli.eth/video/7610033689593924885"></blockquote>
    </div>

    <div class="card">
      <blockquote class="tiktok-embed"
      cite="https://www.tiktok.com/@carli.eth/video/7611466091168140565"></blockquote>
    </div>

  </div>

  <!-- YouTube -->
  <div class="column">
    <h3>▶️ YouTube</h3>

    <div class="card">
      <iframe src="https://www.youtube.com/embed/wkSxOg_7CHw"></iframe>
    </div>

    <div class="card">
      <iframe src="https://www.youtube.com/embed/9F5QYo-pZO4"></iframe>
    </div>

    <div class="card">
      <iframe src="https://www.youtube.com/embed/h7imPcXUGbs"></iframe>
    </div>

  </div>

  <!-- X -->
  <div class="column">
    <h3>🐦 X</h3>

    <div class="card">
      <p>Follow me on X:</p>
      <a href="https://x.com/CharlieAkatsuki" target="_blank">
        👉 Open X Profile
      </a>
    </div>

  </div>

</div>

</div>

<!-- TikTok script (WAJIB 1x saja) -->
<script async src="https://www.tiktok.com/embed.js"></script>

</body>
</html>

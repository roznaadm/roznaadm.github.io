<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Carli Susanto</title>

<style>
:root {
  --bg: #0f172a;
  --text: white;
  --card: #1e293b;
}

.light {
  --bg: #f1f5f9;
  --text: #0f172a;
  --card: white;
}

body {
  margin: 0;
  font-family: Arial;
  background: var(--bg);
  color: var(--text);
  transition: 0.3s;
}

.container {
  max-width: 900px;
  margin: auto;
  padding: 20px;
  text-align: center;
}

/* ANIMATION */
.fade {
  opacity: 0;
  transform: translateY(20px);
  animation: fadeUp 0.8s forwards;
}

@keyframes fadeUp {
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

.profile {
  width: 120px;
  border-radius: 50%;
}

.links a {
  display: inline-block;
  margin: 10px;
  padding: 12px 20px;
  background: var(--card);
  border-radius: 10px;
  text-decoration: none;
  color: var(--text);
  transition: 0.3s;
}

.links a:hover {
  transform: scale(1.1);
}

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px,1fr));
  gap: 15px;
}

iframe {
  width: 100%;
  height: 300px;
  border-radius: 10px;
}

.toggle {
  position: fixed;
  top: 10px;
  right: 10px;
  background: var(--card);
  padding: 10px;
  cursor: pointer;
  border-radius: 10px;
}
</style>
</head>

<body>

<div class="toggle" onclick="toggleMode()">🌙</div>

<div class="container fade">

<img class="profile" src="https://pbs.twimg.com/profile_images/1879046675286941697/oV-q5rRK_400x400.jpg">

<h1>🚀 Carli Susanto</h1>
<p>Content Creator | Web3 | Crypto</p>

<div class="links">
  <a href="https://www.tiktok.com/@carli.eth">TikTok</a>
  <a href="https://www.youtube.com/@C-Quest/">YouTube</a>
  <a href="https://www.facebook.com/charlie.akatsuki/">Facebook</a>
  <a href="https://x.com/CharlieAkatsuki">X</a>
</div>

<h2>▶️ Latest YouTube</h2>

<div class="grid" id="youtube"></div>

</div>

<script>
function toggleMode() {
  document.body.classList.toggle("light");
}

/* AUTO FETCH YOUTUBE (RSS trick) */
fetch("https://api.rss2json.com/v1/api.json?rss_url=https://www.youtube.com/feeds/videos.xml?channel_id=UCaJVCODUCzyxO2bK4mVURRg")
.then(res => res.json())
.then(data => {
  const container = document.getElementById("youtube");

  data.items.slice(0,6).forEach(video => {
    const id = video.link.split("v=")[1];
    container.innerHTML += `
      <iframe src="https://www.youtube.com/embed/${id}" loading="lazy"></iframe>
    `;
  });
});
</script>

</body>
</html>

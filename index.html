<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Carli Susanto</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0f172a;
  color: white;
}

.container {
  max-width: 1200px;
  margin: auto;
  padding: 20px;
}

/* HEADER */
.header {
  text-align: center;
}

.profile {
  width: 100px;
  border-radius: 50%;
}

/* LINKS */
.links {
  text-align: center;
}

.links a {
  display: inline-block;
  margin: 8px;
  padding: 10px 18px;
  background: #1e293b;
  border-radius: 10px;
  text-decoration: none;
  color: white;
  transition: 0.3s;
}

.links a:hover {
  transform: scale(1.1);
}

.links a img {
  vertical-align: middle;
  margin-right: 6px;
  filter: invert(1);
}

/* GRID */
.grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 20px;
  margin-top: 30px;
}

.column {
  display: flex;
  flex-direction: column;
  gap: 15px;
}

.card {
  background: #1e293b;
  padding: 10px;
  border-radius: 12px;
}

/* iframe */
iframe {
  width: 100%;
  height: 250px;
  border-radius: 10px;
}

/* widget styling */
.sk-tiktok-feed,
.sk-ww-twitter-feed {
  border-radius: 12px;
  overflow: hidden;
}

/* MOBILE */
@media (max-width: 900px) {
  .grid {
    grid-template-columns: 1fr;
  }
}
</style>
</head>

<body>

<div class="container">

<!-- HEADER -->
<div class="header">
  <img class="profile" src="https://pbs.twimg.com/profile_images/1879046675286941697/oV-q5rRK_400x400.jpg">
  <h1>Carli Susanto</h1>
  <p>Content Creator | Web3 | Crypto</p>

  <!-- COUNTER -->
  <p id="counter">👀 Visitors: loading...</p>
</div>

<!-- LINKS -->
<div class="links">

  <a href="https://www.tiktok.com/@carli.eth" target="_blank">
    <img src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/tiktok.svg" width="16">
    TikTok
  </a>

  <a href="https://www.youtube.com/@C-Quest/" target="_blank">
    <img src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/youtube.svg" width="16">
    YouTube
  </a>

  <a href="https://x.com/CharlieAkatsuki" target="_blank">
    <img src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/x.svg" width="16">
    X
  </a>

</div>

<!-- GRID -->
<div class="grid">

  <!-- TikTok -->
  <div class="column">
    <h3>
      <img src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/tiktok.svg" width="18" style="filter:invert(1);">
      TikTok
    </h3>

    <div class="card">
      <div class="sk-tiktok-feed" data-embed-id="25672206"></div>
    </div>
  </div>

  <!-- YouTube -->
  <div class="column">
    <h3>
      <img src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/youtube.svg" width="18" style="filter:invert(1);">
      YouTube
    </h3>

    <div class="card">
      <iframe src="https://www.youtube.com/embed/wkSxOg_7CHw"></iframe>
    </div>

    <div class="card">
      <iframe src="https://www.youtube.com/embed/9F5QYo-pZO4"></iframe>
    </div>

    <div class="card">
      <iframe src="https://www.youtube.com/embed/h7imPcXUGbs"></iframe>
    </div>
  </div>

  <!-- X -->
  <div class="column">
    <h3>
      <img src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/x.svg" width="18" style="filter:invert(1);">
      X
    </h3>

    <div class="card">
      <div class="sk-ww-twitter-feed" data-embed-id="25672207"></div>
    </div>
  </div>

</div>

</div>

<!-- SCRIPT -->

<!-- TikTok Widget -->
<script src="https://widgets.sociablekit.com/tiktok-feed/widget.js" defer></script>

<!-- X Widget -->
<script src="https://widgets.sociablekit.com/twitter-feed/widget.js" defer></script>

<!-- Visitor Counter -->
<script>
fetch('https://api.countapi.xyz/hit/carlisusanto.me/visits')
  .then(res => res.json())
  .then(data => {
    document.getElementById('counter').innerText =
      "👀 Visitors: " + data.value;
  });
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Carli Susanto</title>

<style>
:root {
  --bg: #0f172a;
  --text: white;
  --card: #1e293b;
}

.light {
  --bg: #f1f5f9;
  --text: #0f172a;
  --card: white;
}

body {
  margin: 0;
  font-family: Arial;
  background: var(--bg);
  color: var(--text);
  transition: 0.3s;
}

.container {
  max-width: 1200px;
  margin: auto;
  padding: 20px;
}

/* HEADER */
.header {
  text-align: center;
}

.profile {
  width: 100px;
  border-radius: 50%;
}

/* LINKS */
.links {
  text-align: center;
}

.links a {
  display: inline-block;
  margin: 8px;
  padding: 10px 18px;
  background: var(--card);
  border-radius: 10px;
  text-decoration: none;
  color: var(--text);
  transition: 0.3s;
}

.links a:hover {
  transform: scale(1.1);
}

/* FEED */
.feed {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 20px;
  margin-top: 30px;
}

.column {
  display: flex;
  flex-direction: column;
  gap: 15px;
}

.card {
  background: var(--card);
  padding: 10px;
  border-radius: 12px;
}

/* TikTok fix */
.tiktok-embed {
  margin: auto !important;
}

/* iframe */
iframe {
  width: 100%;
  height: 250px;
  border-radius: 10px;
}

/* MOBILE */
@media (max-width: 900px) {
  .feed {
    grid-template-columns: 1fr;
  }
}

.toggle {
  position: fixed;
  top: 10px;
  right: 10px;
  background: var(--card);
  padding: 10px;
  cursor: pointer;
  border-radius: 10px;
}
</style>
</head>

<body>

<div class="toggle" onclick="toggleMode()">🌙</div>

<div class="container">

<!-- HEADER -->
<div class="header">
  <img class="profile" src="https://pbs.twimg.com/profile_images/1879046675286941697/oV-q5rRK_400x400.jpg">
  <h1>Carli Susanto</h1>
  <p>Content Creator | Web3 | Crypto</p>
</div>

<!-- LINKS -->
<div class="links">
  <a href="https://www.tiktok.com/@carli.eth" target="_blank">TikTok</a>
  <a href="https://www.youtube.com/@C-Quest/" target="_blank">YouTube</a>
  <a href="https://x.com/CharlieAkatsuki" target="_blank">X</a>
</div>

<!-- FEED -->
<div class="feed">

  <!-- TikTok -->
  <div class="column">
    <h3>🎵 TikTok</h3>

    <div class="card">
      <blockquote class="tiktok-embed"
      cite="https://www.tiktok.com/@carli.eth/video/7626147395079802133"></blockquote>
    </div>

    <div class="card">
      <blockquote class="tiktok-embed"
      cite="https://www.tiktok.com/@carli.eth/video/7610033689593924885"></blockquote>
    </div>

    <div class="card">
      <blockquote class="tiktok-embed"
      cite="https://www.tiktok.com/@carli.eth/video/7611466091168140565"></blockquote>
    </div>

  </div>

  <!-- YouTube -->
  <div class="column">
    <h3>▶️ YouTube</h3>
    <div id="youtube"></div>
  </div>

  <!-- X -->
  <div class="column">
    <h3>🐦 X</h3>

    <div class="card">
      <iframe 
      src="https://twitframe.com/show?url=https://x.com/CharlieAkatsuki"
      width="100%" height="500"></iframe>
    </div>

  </div>

</div>

</div>

<!-- SCRIPT -->
<script async src="https://www.tiktok.com/embed.js"></script>

<script>
function toggleMode() {
  document.body.classList.toggle("light");
}

/* YOUTUBE AUTO LOAD */
fetch("https://api.rss2json.com/v1/api.json?rss_url=https://www.youtube.com/feeds/videos.xml?channel_id=UCaJVCODUCzyxO2bK4mVURRg")
.then(res => res.json())
.then(data => {
  const container = document.getElementById("youtube");

  data.items.slice(0,6).forEach(video => {
    const id = video.link.split("v=")[1];
    container.innerHTML += `
      <div class="card">
        <iframe src="https://www.youtube.com/embed/${id}" loading="lazy"></iframe>
      </div>
    `;
  });
});
</script>

</body>
</html>
